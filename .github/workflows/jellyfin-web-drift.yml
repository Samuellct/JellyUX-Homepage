name: Jellyfin Web Drift Check

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    name: Check loadSections patterns against jellyfin/jellyfin:latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 9.0.x

      - name: Extract jellyfin-web from the latest image
        run: |
          docker pull jellyfin/jellyfin:latest
          docker create --name jf-drift-extract jellyfin/jellyfin:latest
          WEB_DIR=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' jf-drift-extract | grep '^JELLYFIN_WEB_DIR=' | cut -d= -f2)
          echo "Detected JELLYFIN_WEB_DIR=$WEB_DIR"
          docker cp "jf-drift-extract:$WEB_DIR" ./jellyfin-web-extract
          docker rm jf-drift-extract
          echo "JELLYFIN_WEB_EXTRACT_PATH=$PWD/jellyfin-web-extract" >> "$GITHUB_ENV"

      - name: Restore & build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Run drift check
        run: dotnet test --no-build --configuration Release --filter "Category=RequiresDocker"
