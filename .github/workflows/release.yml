name: Release

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install JPRM
        run: python -m pip install jprm

      - name: Resolve version
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "semver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}.0" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        id: build
        run: |
          mkdir -p artifacts
          jprm plugin build . \
            --version="${{ steps.v.outputs.version }}" \
            --output=./artifacts
          ZIP=$(ls ./artifacts/*.zip | head -1)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true

      - name: Update manifest.json
        run: |
          FILENAME=$(basename "${{ steps.build.outputs.zip }}")
          jprm repo add \
            --plugin-url="https://github.com/Samuellct/JellyUX-Homepage/releases/download/${{ github.ref_name }}/${FILENAME}" \
            ./ "${{ steps.build.outputs.zip }}"

      - name: Inject changelog into manifest.json
        run: |
          python3 - <<'PYEOF'
          import json, re, sys

          version = "${{ steps.v.outputs.semver }}"

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = r'## \[' + re.escape(version) + r'\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          changelog = match.group(1).strip() if match else ''

          if not changelog:
              print(f'WARNING: no changelog section found for v{version}')

          with open('manifest.json', 'r', encoding='utf-8') as f:
              manifest = json.load(f)

          patched = False
          for plugin in manifest:
              for v in plugin.get('versions', []):
                  if v['version'].startswith(version):
                      v['changelog'] = changelog
                      patched = True
                      break

          if not patched:
              print(f'WARNING: version {version} not found in manifest.json')
              sys.exit(1)

          with open('manifest.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=4, ensure_ascii=False)
              f.write('\n')

          print(f'Changelog injected for v{version}')
          PYEOF

      - name: Commit manifest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin main
